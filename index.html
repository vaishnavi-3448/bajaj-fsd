<!DOCTYPE html>
<html>
<head>
    <title>Hierarchy Builder</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Hierarchy Builder</h1>
    <p class="subtitle">Enter node relationships (comma separated)</p>

    <textarea id="input">
A->B,A->C,B->D,C->E,E->F,X->Y,Y->Z,Z->X,P->Q,Q->R,G->H,G->H,G->I,hello,1->2,A->
    </textarea>

    <button onclick="send()">Generate Hierarchy</button>

    <div id="status"></div>

    <pre id="output"></pre>

</div>

<script>
async function send() {
    const raw = document.getElementById("input").value;

    const data = raw
        .split(",")
        .map(x => x.trim())
        .filter(x => x.length > 0);

    document.getElementById("status").innerText = "Processing...";
    document.getElementById("output").innerText = "";

    try {
        const res = await fetch("https://bajaj-fsd.onrender.com/bfhl", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({ data }),
    mode: "cors"
    });

        const json = await res.json();

        document.getElementById("status").innerText = "Successfully Generated Hierarchy ";

        document.getElementById("output").innerText =
            JSON.stringify(json, null, 2);

    } catch (err) {
        document.getElementById("status").innerText =
            "Failed to connect to API";
    }
}
</script>

</body>
</html>
